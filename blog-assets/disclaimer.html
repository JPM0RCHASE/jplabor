<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#888;}
  /* 캡처 대상: 1000 x auto (밝은 톤, 블로그 본문 친화) */
  .disc{
    width:1000px;position:relative;overflow:hidden;
    background:#f7faf8;
    border:1px solid #e3ece6;
    border-left:5px solid #1ed760;
    border-radius:14px;
    font-family:'Pretendard',sans-serif;
    padding:34px 40px;
    display:flex;gap:22px;align-items:flex-start;
  }
  .disc .icon{
    flex-shrink:0;width:46px;height:46px;border-radius:50%;
    background:rgba(30,215,96,.12);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;margin-top:2px;
  }
  .disc .body{flex:1;}
  .disc .head{
    font-size:20px;font-weight:800;color:#16562f;letter-spacing:-.4px;
    margin-bottom:12px;display:flex;align-items:center;gap:8px;
  }
  .disc .head .tag{
    font-size:12px;font-weight:700;color:#1aa34a;
    background:#e7f8ee;padding:3px 10px;border-radius:9999px;letter-spacing:.3px;
  }
  .disc .text{
    font-size:16.5px;font-weight:500;color:#4a5a52;line-height:1.85;letter-spacing:-.2px;
  }
  .disc .text b{color:#16562f;font-weight:700;}
  .disc .sign{
    margin-top:16px;font-size:14px;font-weight:700;color:#9aa8a0;letter-spacing:.3px;
  }
  .disc .sign b{color:#1ed760;}
</style>
</head>
<body>
  <div class="disc" id="capture">
    <div class="icon">⚖️</div>
    <div class="body">
      <div class="head">안내 <span class="tag">DISCLAIMER</span></div>
      <div class="text">
        본 블로그에 게재된 내용은 <b>일반적인 정보 제공</b>을 목적으로 작성되었습니다.
        본 블로그의 정보는 구체적인 사안에 따라 내용이 달라질 수 있으므로,
        개별 사안에 대하여 <b>반드시 전문가와 직접 상담</b>하시기 바랍니다.
      </div>
      <div class="sign"><b>jp</b>labor.com · 공인노무사 JP</div>
    </div>
  </div>
</body>
</html>
