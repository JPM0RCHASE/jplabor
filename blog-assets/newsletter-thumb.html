<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#555;font-family:'Pretendard',sans-serif;}
  #thumb{
    width:1200px;height:628px;position:relative;overflow:hidden;display:flex;
    background:#121212;
  }
  /* 상단 네온 라인 */
  #thumb::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;z-index:5;
    background:#1ed760;box-shadow:0 0 24px rgba(30,215,96,.6);}

  /* 좌측 패널 */
  .left{width:420px;height:100%;position:relative;flex-shrink:0;
    background:linear-gradient(160deg,#1a1c1f 0%,#141618 60%,#0e0f11 100%);
    padding:56px 44px;display:flex;flex-direction:column;justify-content:space-between;}
  .left::after{content:"";position:absolute;right:0;top:0;bottom:0;width:1px;
    background:linear-gradient(to bottom,transparent,rgba(30,215,96,.35),transparent);}
  .glow{position:absolute;left:-100px;top:-100px;width:340px;height:340px;border-radius:50%;
    background:radial-gradient(circle,rgba(30,215,96,.16),transparent 65%);}
  .eyebrow{font-size:15px;font-weight:800;letter-spacing:4px;color:#1ed760;
    text-transform:uppercase;display:flex;align-items:center;gap:10px;position:relative;z-index:2;}
  .eyebrow .dot{width:8px;height:8px;border-radius:50%;background:#1ed760;
    box-shadow:0 0 12px rgba(30,215,96,.9);}
  .htitle{position:relative;z-index:2;}
  .htitle h1{font-size:72px;font-weight:800;letter-spacing:-3px;line-height:1.05;color:#fff;}
  .htitle h1 .acc{color:#1ed760;text-shadow:0 0 40px rgba(30,215,96,.5);}
  .htitle p{margin-top:18px;font-size:19px;font-weight:500;color:#a7abb0;letter-spacing:-.3px;}
  .foot{position:relative;z-index:2;}
  .foot .date{font-size:26px;font-weight:800;color:#1ed760;letter-spacing:-.5px;}
  .foot .brand{margin-top:6px;font-size:15px;font-weight:600;color:#6b7075;letter-spacing:1px;}

  /* 우측 목차 */
  .right{flex:1;height:100%;padding:60px 56px;display:flex;flex-direction:column;}
  .right .label{font-size:15px;font-weight:800;letter-spacing:3px;color:#1ed760;
    text-transform:uppercase;display:flex;align-items:center;gap:12px;}
  .right .label::after{content:"";flex:1;height:1px;background:#2a2e33;}
  .toc{margin-top:30px;display:flex;flex-direction:column;gap:14px;}
  .item{display:flex;align-items:center;gap:18px;
    background:#181a1d;border:1px solid #24282d;border-radius:13px;padding:17px 24px;
    transition:none;}
  .item .no{font-size:22px;font-weight:800;color:#1ed760;width:30px;flex-shrink:0;
    font-variant-numeric:tabular-nums;}
  .item .tx{font-size:25px;font-weight:700;color:#eaecee;letter-spacing:-.6px;line-height:1.3;}
  .item .tx b{color:#1ed760;font-weight:800;}
  .right .url{margin-top:auto;padding-top:26px;font-size:15px;font-weight:600;color:#5a5f65;letter-spacing:.3px;}
  .right .url b{color:#1ed760;}
</style>
</head>
<body>
<div id="thumb">
  <div class="left">
    <div class="glow"></div>
    <div class="eyebrow"><span class="dot"></span>WEEKLY · LABOR · HR</div>
    <div class="htitle">
      <h1>인사 노무<br><span class="acc">브리핑</span></h1>
      <p>이번 주 노동·HR·정책 핵심 정리</p>
    </div>
    <div class="foot">
      <div class="date">2026년 7월 첫째주</div>
      <div class="brand">JP LABOR LETTER</div>
    </div>
  </div>
  <div class="right">
    <div class="label">이번 주 뉴스레터 목차</div>
    <div class="toc">
      <div class="item"><span class="no">01</span><span class="tx">금주의 <b>TOP 3 노동뉴스</b></span></div>
      <div class="item"><span class="no">02</span><span class="tx">정부·노동부·국회 <b>정책동향</b></span></div>
      <div class="item"><span class="no">03</span><span class="tx">JP's Weekly Insight <b>이번 주 많이 받은 질문</b></span></div>
      <div class="item"><span class="no">04</span><span class="tx"><b>5인 미만 사업장</b> 집중 이슈</span></div>
      <div class="item"><span class="no">05</span><span class="tx">이번 주 주요 <b>노동 판결</b></span></div>
    </div>
    <div class="url">jplabor.com · <b>공인노무사 JP</b></div>
  </div>
</div>
</body>
</html>
