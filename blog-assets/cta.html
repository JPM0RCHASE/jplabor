<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JP LABOR CTA</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#444;}
  /* 캡처 대상: 1000x180 */
  .cta{
    width:1000px;height:180px;position:relative;overflow:hidden;
    background:linear-gradient(100deg,#1ed760 0%,#17c155 60%,#11a847 100%);
    font-family:'Pretendard',sans-serif;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 56px;
  }
  .cta-left .head{
    font-size:34px;font-weight:800;color:#063018;letter-spacing:-.6px;line-height:1.3;
  }
  .cta-left .url{
    font-size:20px;font-weight:600;color:rgba(0,40,15,.55);margin-top:8px;letter-spacing:.3px;
  }
  .cta-btn{
    background:#0a0a0a;color:#ffffff;font-size:26px;font-weight:700;
    padding:20px 40px;border-radius:9999px;white-space:nowrap;
    box-shadow:0 8px 24px rgba(0,0,0,.25);letter-spacing:-.3px;
  }
  .cta-btn .arrow{color:#1ed760;margin-left:8px;}
</style>
</head>
<body>
  <div class="cta" id="capture">
    <div class="cta-left">
      <div class="head">더 복잡한 사안은<br>JP 노무사에게</div>
      <div class="url">jplabor.com</div>
    </div>
    <div class="cta-btn">상담문의<span class="arrow">→</span></div>
  </div>
</body>
</html>
