<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#555;font-family:'Pretendard',sans-serif;}
  #thumb{
    width:1920px;height:640px;position:relative;overflow:hidden;
    background:linear-gradient(135deg,#16181c 0%,#101216 50%,#0c0d10 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
  }
  /* 좌측 브랜드 바 */
  #thumb::before{content:"";position:absolute;left:0;top:0;bottom:0;width:14px;
    background:#1ed760;box-shadow:0 0 40px rgba(30,215,96,.55);}
  /* 우측 브랜드 바 */
  #thumb::after{content:"";position:absolute;right:0;top:0;bottom:0;width:14px;
    background:#1ed760;box-shadow:0 0 40px rgba(30,215,96,.55);}
  /* 좌측 글로우 */
  .glow-l{position:absolute;left:-200px;bottom:-200px;width:700px;height:700px;border-radius:50%;
    background:radial-gradient(circle,rgba(30,215,96,.14),transparent 65%);}
  /* 우측 글로우 */
  .glow-r{position:absolute;right:-200px;top:-200px;width:700px;height:700px;border-radius:50%;
    background:radial-gradient(circle,rgba(30,215,96,.14),transparent 65%);}
  /* 잎맥 — 좌우 대칭 배치 */
  .veins-l{position:absolute;left:60px;top:50%;transform:translateY(-50%);
    width:540px;height:540px;opacity:.16;}
  .veins-r{position:absolute;right:60px;top:50%;transform:translateY(-50%);
    width:540px;height:540px;opacity:.16;transform:translateY(-50%) scaleX(-1);}
  /* 콘텐츠 */
  .label{font-size:26px;font-weight:800;letter-spacing:6px;color:#1ed760;
    text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:14px;}
  .label .dot{width:11px;height:11px;border-radius:50%;background:#1ed760;
    box-shadow:0 0 16px rgba(30,215,96,.9);}
  .title{font-size:96px;font-weight:800;letter-spacing:-4px;line-height:1.06;color:#fff;
    text-shadow:0 8px 50px rgba(0,0,0,.7);}
  .title .acc{color:#1ed760;text-shadow:0 0 50px rgba(30,215,96,.55);}
  .slogan{display:inline-flex;align-items:center;gap:12px;margin-top:32px;
    background:rgba(30,215,96,.1);border:1.5px solid rgba(30,215,96,.45);
    padding:14px 28px;border-radius:14px;}
  .slogan .ico{font-size:26px;}
  .slogan .tx{font-size:28px;font-weight:700;color:#ffffff;letter-spacing:-.5px;}
  .slogan .tx b{color:#1ed760;}
  .tags{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;justify-content:center;}
  .tags span{font-size:22px;font-weight:700;color:#cfd2d6;
    background:#1f2228;border:1px solid #313640;padding:10px 22px;border-radius:999px;}
  .tags span b{color:#1ed760;}
</style>
</head>
<body>
<div id="thumb">
  <div class="glow-l"></div>
  <div class="glow-r"></div>
  <svg class="veins-l" viewBox="0 0 200 200" fill="none" stroke="#1ed760" stroke-width="1.3">
    <path d="M100 8 V192"/>
    <path d="M100 48 L152 22 M100 48 L48 22"/>
    <path d="M100 90 L168 58 M100 90 L32 58"/>
    <path d="M100 132 L162 106 M100 132 L38 106"/>
    <path d="M100 168 L142 150 M100 168 L58 150"/>
  </svg>
  <svg class="veins-r" viewBox="0 0 200 200" fill="none" stroke="#1ed760" stroke-width="1.3">
    <path d="M100 8 V192"/>
    <path d="M100 48 L152 22 M100 48 L48 22"/>
    <path d="M100 90 L168 58 M100 90 L32 58"/>
    <path d="M100 132 L162 106 M100 132 L38 106"/>
    <path d="M100 168 L142 150 M100 168 L58 150"/>
  </svg>
  <div class="label"><span class="dot"></span>JP LABOR · 인사노무 실무<span class="dot"></span></div>
  <div class="title">인사노무 <span class="acc">가이드</span> 블로그</div>
  <div class="slogan">
    <span class="ico">⚖️</span>
    <span class="tx">현장에서 <b>바로 쓰는</b> 노동법 실무</span>
  </div>
  <div class="tags">
    <span># 근로기준법</span>
    <span># 노사관계</span>
    <span># 공인노무사 <b>JP</b></span>
    <span># 인사노무가이드북</span>
    <span># 뉴스레터</span>
    <span># 카드뉴스</span>
  </div>
</div>
</body>
</html>
