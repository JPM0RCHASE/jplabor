<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#555;font-family:'Pretendard',sans-serif;}
  #thumb{
    width:1920px;height:1080px;position:relative;overflow:hidden;
    /* 순검정 대신 딥차콜+미세 네이비로 차별화, 글로우 절제 */
    background:linear-gradient(135deg,#16181c 0%,#101216 50%,#0c0d10 100%);
    display:flex;flex-direction:column;justify-content:center;
    padding:0 150px;
  }
  /* 좌측 브랜드 바 — 더 선명하게 */
  #thumb::before{content:"";position:absolute;left:0;top:0;bottom:0;width:14px;
    background:#1ed760;box-shadow:0 0 40px rgba(30,215,96,.55);}
  /* 우측 그린 단일 글로우 — 절제된 한 점 */
  .glow{position:absolute;right:-160px;top:-160px;width:680px;height:680px;border-radius:50%;
    background:radial-gradient(circle,rgba(30,215,96,.18),transparent 65%);}
  /* 추상 잎맥 라인 — 더 또렷하게(저채도 그린) */
  .veins{position:absolute;right:60px;top:50%;transform:translateY(-50%);
    width:720px;height:720px;opacity:.22;}
  .label{font-size:30px;font-weight:800;letter-spacing:6px;color:#1ed760;
    text-transform:uppercase;margin-bottom:30px;display:flex;align-items:center;gap:16px;}
  .label .dot{width:13px;height:13px;border-radius:50%;background:#1ed760;
    box-shadow:0 0 18px rgba(30,215,96,.9);}
  .title{font-size:120px;font-weight:800;letter-spacing:-4px;line-height:1.04;color:#fff;
    text-shadow:0 8px 50px rgba(0,0,0,.7);}
  .title .acc{color:#1ed760;text-shadow:0 0 50px rgba(30,215,96,.55);}
  /* 슬로건을 칩으로 — 또렷한 밝은 글씨 + 경계선 */
  .slogan{display:inline-flex;align-items:center;gap:14px;margin-top:46px;
    background:rgba(30,215,96,.1);border:1.5px solid rgba(30,215,96,.45);
    padding:18px 30px;border-radius:14px;}
  .slogan .ico{font-size:30px;}
  .slogan .tx{font-size:34px;font-weight:700;color:#ffffff;letter-spacing:-.5px;}
  .slogan .tx b{color:#1ed760;}
  /* 핵심 키워드 칩 3개 — 한눈에 */
  .tags{display:flex;gap:16px;margin-top:34px;}
  .tags span{font-size:27px;font-weight:700;color:#cfd2d6;
    background:#1f2228;border:1px solid #313640;padding:13px 26px;border-radius:999px;}
  .tags span b{color:#1ed760;}
  .wm{position:absolute;right:120px;bottom:74px;font-size:34px;font-weight:800;color:#6b6f76;}
  .wm b{color:#1ed760;}
</style>
</head>
<body>
<div id="thumb">
  <div class="glow"></div>
  <svg class="veins" viewBox="0 0 200 200" fill="none" stroke="#1ed760" stroke-width="1.3">
    <path d="M100 8 V192"/>
    <path d="M100 48 L152 22 M100 48 L48 22"/>
    <path d="M100 90 L168 58 M100 90 L32 58"/>
    <path d="M100 132 L162 106 M100 132 L38 106"/>
    <path d="M100 168 L142 150 M100 168 L58 150"/>
  </svg>
  <div class="label"><span class="dot"></span>JP LABOR · 인사노무 실무</div>
  <div class="title">인사노무<br><span class="acc">가이드</span> 블로그</div>
  <div class="slogan">
    <span class="ico">⚖️</span>
    <span class="tx">현장에서 <b>바로 쓰는</b> 노동법 실무</span>
  </div>
  <div class="tags">
    <span># 근로기준법</span>
    <span># 노사관계</span>
    <span># 공인노무사 <b>JP</b></span>
    <span># 인사노무가이드북</span>
    <span># 뉴스레터</span>
    <span># 카드뉴스</span>
  </div>
  <div class="wm">공인노무사 <b>JP</b></div>
</div>
</body>
</html>
