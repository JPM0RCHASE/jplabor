<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#555;font-family:'Pretendard',sans-serif;}
  #thumb{
    width:1000px;height:1000px;position:relative;overflow:hidden;
    background:linear-gradient(145deg,#16181c 0%,#101216 55%,#0c0d10 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
  }
  /* 상단 브랜드 바 */
  #thumb::before{content:"";position:absolute;top:0;left:0;right:0;height:10px;
    background:#1ed760;box-shadow:0 0 30px rgba(30,215,96,.6);}
  /* 하단 브랜드 바 */
  #thumb::after{content:"";position:absolute;bottom:0;left:0;right:0;height:10px;
    background:#1ed760;box-shadow:0 0 30px rgba(30,215,96,.6);}
  /* 중앙 배경 글로우 */
  .glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:800px;height:800px;border-radius:50%;
    background:radial-gradient(circle,rgba(30,215,96,.1),transparent 65%);}
  /* 좌상 / 우하 코너 장식 */
  .corner-tl{position:absolute;left:-120px;top:-120px;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(30,215,96,.12),transparent 65%);}
  .corner-br{position:absolute;right:-120px;bottom:-120px;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(30,215,96,.12),transparent 65%);}
  /* 추상 잎맥 */
  .veins{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:900px;height:900px;opacity:.1;}
  .label{font-size:22px;font-weight:800;letter-spacing:5px;color:#1ed760;
    text-transform:uppercase;margin-bottom:28px;display:flex;align-items:center;gap:12px;}
  .label .dot{width:10px;height:10px;border-radius:50%;background:#1ed760;
    box-shadow:0 0 14px rgba(30,215,96,.9);}
  .title{font-size:88px;font-weight:800;letter-spacing:-3px;line-height:1.08;color:#fff;
    text-shadow:0 8px 50px rgba(0,0,0,.8);}
  .title .acc{color:#1ed760;text-shadow:0 0 50px rgba(30,215,96,.6);}
  .slogan{display:inline-flex;align-items:center;gap:12px;margin-top:36px;
    background:rgba(30,215,96,.1);border:1.5px solid rgba(30,215,96,.45);
    padding:16px 28px;border-radius:14px;}
  .slogan .ico{font-size:26px;}
  .slogan .tx{font-size:26px;font-weight:700;color:#ffffff;letter-spacing:-.5px;}
  .slogan .tx b{color:#1ed760;}
  .tags{display:grid;grid-template-columns:repeat(3,auto);gap:10px;margin-top:28px;
    justify-content:center;justify-items:center;max-width:780px;}
  .tags span{font-size:19px;font-weight:700;color:#cfd2d6;
    background:#1f2228;border:1px solid #313640;padding:9px 20px;border-radius:999px;
    white-space:nowrap;}
  .tags span b{color:#1ed760;}
  .wm{position:absolute;bottom:32px;right:36px;font-size:20px;font-weight:800;color:#454a52;}
  .wm b{color:#1ed760;}
</style>
</head>
<body>
<div id="thumb">
  <div class="glow"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <svg class="veins" viewBox="0 0 200 200" fill="none" stroke="#1ed760" stroke-width="0.8">
    <path d="M100 4 V196"/>
    <path d="M100 40 L160 10 M100 40 L40 10"/>
    <path d="M100 80 L175 44 M100 80 L25 44"/>
    <path d="M100 120 L170 94 M100 120 L30 94"/>
    <path d="M100 160 L148 140 M100 160 L52 140"/>
    <path d="M100 196 L130 178 M100 196 L70 178"/>
  </svg>
  <div class="label"><span class="dot"></span>JP LABOR · 인사노무 실무<span class="dot"></span></div>
  <div class="title">인사노무<br><span class="acc">가이드</span> 블로그</div>
  <div class="slogan">
    <span class="ico">⚖️</span>
    <span class="tx">현장에서 <b>바로 쓰는</b> 노동법 실무</span>
  </div>
  <div class="tags">
    <span># 근로기준법</span>
    <span># 노사관계</span>
    <span># 공인노무사 <b>JP</b></span>
    <span># 인사노무가이드북</span>
    <span># 뉴스레터</span>
    <span># 카드뉴스</span>
  </div>
  <div class="wm">공인노무사 <b>JP</b></div>
</div>
</body>
</html>
