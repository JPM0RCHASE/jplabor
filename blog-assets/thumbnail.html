<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JP LABOR 썸네일</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#444;}
  /* 캡처 대상: 1200x630 */
  .thumb{
    width:1200px;height:630px;position:relative;overflow:hidden;
    background:
      radial-gradient(circle at 18% 22%, rgba(30,215,96,.10), transparent 42%),
      radial-gradient(circle at 88% 90%, rgba(30,215,96,.06), transparent 40%),
      #121212;
    font-family:'Pretendard',-apple-system,sans-serif;
    display:flex;flex-direction:column;justify-content:center;
    padding:0 90px;
  }
  /* 좌측 세로 네온 라인 */
  .thumb::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
    background:linear-gradient(180deg,#1ed760,rgba(30,215,96,.15));
  }
  .label{
    font-size:22px;font-weight:700;letter-spacing:3px;
    color:#1ed760;text-transform:uppercase;margin-bottom:34px;
  }
  .label .dot{
    display:inline-block;width:9px;height:9px;border-radius:50%;
    background:#1ed760;margin-right:12px;vertical-align:middle;
    box-shadow:0 0 12px rgba(30,215,96,.8);
  }
  .title{
    font-size:78px;font-weight:800;line-height:1.22;letter-spacing:-2px;
    color:#ffffff;text-shadow:0 4px 30px rgba(0,0,0,.5);
  }
  .title .acc{
    color:#1ed760;text-shadow:0 0 30px rgba(30,215,96,.45);
  }
  .subtitle{
    font-size:26px;font-weight:500;color:#9a9a9a;margin-top:40px;
    letter-spacing:-.3px;
  }
  /* 하단 네온 포인트 라인 */
  .accent-line{
    position:absolute;left:90px;bottom:78px;width:120px;height:4px;
    background:#1ed760;border-radius:2px;box-shadow:0 0 14px rgba(30,215,96,.6);
  }
  .watermark{
    position:absolute;right:46px;bottom:38px;
    font-size:20px;font-weight:700;color:#6f6f6f;letter-spacing:.5px;
  }
  .watermark b{color:#1ed760;}
</style>
</head>
<body>
  <div class="thumb" id="capture">
    <div class="label"><span class="dot"></span>JP LABOR · 노동법 실무</div>
    <div class="title">인사담당자가<br><span class="acc">노동조합</span>에 가입했다면?</div>
    <div class="subtitle">노조법 소극적 요건 완벽 정리</div>
    <div class="accent-line"></div>
    <div class="watermark"><b>jp</b>labor.com</div>
  </div>
</body>
</html>
