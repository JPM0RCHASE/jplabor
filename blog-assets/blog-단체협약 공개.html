<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#888;font-family:'Pretendard',sans-serif;}

  /* ── 썸네일 ── */
  .thumb{
    width:1200px;height:630px;position:relative;overflow:hidden;
    background:radial-gradient(circle at 18% 22%,rgba(30,215,96,.10),transparent 42%),
    radial-gradient(circle at 88% 90%,rgba(30,215,96,.06),transparent 40%),#121212;
    display:flex;flex-direction:column;justify-content:center;padding:0 90px;
  }
  .thumb::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
    background:linear-gradient(180deg,#1ed760,rgba(30,215,96,.15));}
  .t-label{font-size:22px;font-weight:700;letter-spacing:3px;color:#1ed760;
    text-transform:uppercase;margin-bottom:34px;}
  .t-label .dot{display:inline-block;width:9px;height:9px;border-radius:50%;
    background:#1ed760;margin-right:12px;vertical-align:middle;
    box-shadow:0 0 12px rgba(30,215,96,.8);}
  .t-title{font-size:68px;font-weight:800;line-height:1.22;letter-spacing:-2px;
    color:#fff;text-shadow:0 4px 30px rgba(0,0,0,.5);}
  .t-title .acc{color:#1ed760;text-shadow:0 0 30px rgba(30,215,96,.45);}
  .t-sub{font-size:24px;font-weight:500;color:#9a9a9a;margin-top:36px;}
  .t-line{position:absolute;left:90px;bottom:78px;width:120px;height:4px;
    background:#1ed760;border-radius:2px;box-shadow:0 0 14px rgba(30,215,96,.6);}
  .t-wm{position:absolute;right:46px;bottom:38px;font-size:20px;font-weight:700;color:#6f6f6f;}
  .t-wm b{color:#1ed760;}

  /* ── 본문 ── */
  .body-wrap{width:800px;padding:60px 0;background:#fff;margin:40px auto;}

  .intro{font-size:17px;line-height:1.9;color:#333;margin-bottom:40px;}
  .intro .hi{font-size:15px;color:#1a8a42;font-weight:700;
    background:#edf8f1;padding:4px 12px;border-radius:6px;margin-bottom:16px;display:inline-block;}

  /* 섹션 헤더 */
  .sec-head{
    display:flex;align-items:center;gap:14px;
    padding:18px 24px;margin:40px 0 20px;
    background:linear-gradient(90deg,rgba(30,215,96,.09),rgba(30,215,96,.01));
    border-left:5px solid #1ed760;border-radius:0 10px 10px 0;
  }
  .sec-num{font-size:13px;font-weight:800;color:#1ed760;letter-spacing:1px;}
  .sec-title{font-size:20px;font-weight:800;color:#111;letter-spacing:-.4px;}

  /* 핵심 인용 박스 */
  .quote{
    background:#f7fdf9;border:1px solid #c8edda;border-left:4px solid #1ed760;
    border-radius:10px;padding:20px 24px;margin:20px 0;
    font-size:15.5px;line-height:1.8;color:#1a4d2e;
  }
  .quote .q-label{font-size:12px;font-weight:800;color:#1ed760;
    letter-spacing:1px;margin-bottom:8px;display:block;}

  /* 경고 박스 */
  .warn{
    background:#fff8f0;border:1px solid #ffd8a8;border-left:4px solid #f3722b;
    border-radius:10px;padding:20px 24px;margin:20px 0;
    font-size:15px;line-height:1.8;color:#7c3a0a;
  }

  /* 소제목 */
  .sub-head{font-size:17px;font-weight:800;color:#111;margin:28px 0 10px;
    padding-left:14px;border-left:3px solid #1ed760;}

  p{font-size:16px;line-height:1.9;color:#333;margin:12px 0;}
  strong{color:#111;font-weight:700;}
  ul{padding-left:20px;margin:12px 0;}
  li{font-size:16px;line-height:1.9;color:#333;margin:6px 0;}

  /* 태그 */
  .tags{display:flex;flex-wrap:wrap;gap:8px;margin:32px 0 0;}
  .tags span{background:#f0fdf5;color:#1a8a42;font-size:13px;font-weight:700;
    padding:5px 14px;border-radius:9999px;border:1px solid #c8edda;}

  /* ── 면책조항 ── */
  .disc{
    width:800px;margin:40px auto 0;
    background:#f7faf8;border:1px solid #e3ece6;border-left:5px solid #1ed760;
    border-radius:14px;padding:32px 36px;display:flex;gap:20px;align-items:flex-start;
  }
  .disc .icon{flex-shrink:0;width:44px;height:44px;border-radius:50%;
    background:rgba(30,215,96,.12);display:flex;align-items:center;
    justify-content:center;font-size:22px;margin-top:2px;}
  .disc-body{}
  .disc-head{font-size:18px;font-weight:800;color:#16562f;margin-bottom:10px;
    display:flex;align-items:center;gap:8px;}
  .disc-head .tag{font-size:11px;font-weight:700;color:#1aa34a;
    background:#e7f8ee;padding:3px 9px;border-radius:9999px;}
  .disc-text{font-size:15.5px;color:#4a5a52;line-height:1.85;}
  .disc-text b{color:#16562f;font-weight:700;}
  .disc-sign{margin-top:12px;font-size:13px;font-weight:700;color:#9aa8a0;}
  .disc-sign b{color:#1ed760;}
</style>
</head>
<body>
<div class="thumb" id="thumb">
  <div class="t-label"><span class="dot"></span>JP LABOR · 노동법 실무</div>
  <div class="t-title"><span class="acc">단체협약서</span>,<br>비조합원에게도 공개?</div>
  <div class="t-sub">상황별 공개 의무 판단 기준</div>
  <div class="t-line"></div>
  <div class="t-wm"><b>jp</b>labor.com</div>
</div>
<div class="body-wrap" id="body"></div>
<div class="disc" id="disc">
  <div class="icon">⚖️</div>
  <div class="disc-body">
    <div class="disc-head">안내 <span class="tag">DISCLAIMER</span></div>
    <div class="disc-text">본 블로그에 게재된 내용은 <b>일반적인 정보 제공</b>을 목적으로 작성되었습니다.
      구체적인 사안에 따라 내용이 달라질 수 있으므로, 개별 사안에 대하여 <b>반드시 전문가와 직접 상담</b>하시기 바랍니다.</div>
    <div class="disc-sign"><b>jp</b>labor.com · 공인노무사 JP</div>
  </div>
</div>
</body></html>
